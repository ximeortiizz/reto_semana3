path_generator:
  ros__parameters:
    mode: 1  # 0: coordinates + speeds, 1: coordinates + time

    # Coordinates (from mode 0 run)
    points_x: [2.0, 0.7, 2.0, 0.5]
    points_y: [1.0, 1.4, -0.8, -1.0]

    # Mode 0: speeds
    linear_speeds: [0.3, 0.15, 0.3, 0.3]
    angular_speeds: [0.6, 0.4, 0.3, 0.7]

    # Mode 1: times (from mode 1 run)
    path_times: [1.0, 5.0, 8.0, 8.0]